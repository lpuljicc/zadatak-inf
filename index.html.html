<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behind the Scenes - Gaming</title>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px;
            background: linear-gradient(90deg, #6366f1, #d946ef);
        }

        .timeline {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            width: 220px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.05);
            background: #334155;
        }

        .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        #details {
            text-align: center;
            padding: 30px;
            min-height: 200px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .show {
            opacity: 1 !important;
        }

        .detail-img {
            height: 350px; 
            width: auto;
            border-radius: 12px;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: block;
            max-width: 90%; 
        }

        ul {
            text-align: left;
            display: inline-block;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Behind the Scenes</h1>
        <p>Moj put: setup • streamanje • turniri</p>
    </header>

    <section class="timeline">
        <div class="card" onclick="showDetails('setup')">
            <img src="setup.jpg" alt="Slika setupa" class="card-img">
            <h2>PC Setup</h2>
            <p>Klikni za proces</p>
        </div>

        <div class="card" onclick="showDetails('stream')">
            <img src="stream.jpg" alt="Slika streama" class="card-img">
            <h2>Streamanje</h2>
            <p>Klikni za proces</p>
        </div>

        <div class="card" onclick="showDetails('esports')">
            <img src="gejmer.jpg" alt="Slika gejmera" class="card-img">
            <h2>Turniri</h2>
            <p>Klikni za proces</p>
        </div>
    </section>

    <section id="details">
        <h2>Klikni karticu 👆</h2>
    </section>

    <footer>
        <p>© 2026 Moj Gaming Journey</p>
    </footer>

    <script>
    function showDetails(type) {
        let content = "";

        if (type === "setup") {
            content = `
            <h2>🖥️ PC Setup - Behind the Scenes</h2>
            <img src="setup.jpg" alt="PC Setup" class="detail-img">
            <ul>
                <li>Provjera opreme i RGB osvjetljenja</li>
                <li>Ažuriranje drivera i igara</li>
                <li>Postavljanje Discorda za komunikaciju</li>
                <li>Priprema pića (energetsko piće ili voda)</li>
                <li>Zagrijavanje (Aim Lab ili casual mečevi)</li>
            </ul>
            `;
        }

        if (type === "stream") {
            content = `
            <h2>🎥 Streamanje - Behind the Scenes</h2>
            <img src="stream.jpg" alt="Streamanje" class="detail-img">
            <ul>
                <li>Podešavanje kamere, mikrofona i OBS-a</li>
                <li>Najava streama na društvenim mrežama</li>
                <li>Čitanje chata i interakcija s gledateljima</li>
                <li>Kreiranje i spremanje najboljih klipova</li>
                <li>Završavanje streama i "raidanje" drugog streamera</li>
            </ul>
            `;
        }

        if (type === "esports") {
            content = `
            <h2>🏆 Turniri - Behind the Scenes</h2>
            <img src="gejmer.jpg" alt="Turniri" class="detail-img">
            <ul>
                <li>Analiza VOD-ova (pregledavanje vlastitih grešaka)</li>
                <li>Vježbanje strategija s timom (scrimovi)</li>
                <li>Mentalna priprema prije važnog meča</li>
                <li>Fokusirana komunikacija u igri (callouts)</li>
                <li>Analiza nakon meča i dogovor za dalje</li>
            </ul>
            `;
        }

        let details = document.getElementById("details");
        details.classList.remove("show");
        
        setTimeout(() => {
            details.innerHTML = content;
            details.classList.add("show");
        }, 200);
    }
    </script>

</body>
</html>
